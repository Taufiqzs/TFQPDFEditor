<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <!-- Document drop shadow -->
  <rect x="11" y="10" width="63" height="80" rx="7" fill="rgba(0,0,0,0.14)"/>
  <!-- Document body -->
  <rect x="9" y="7" width="63" height="80" rx="7" fill="#FFFFFF"/>
  <!-- TFQPDF title -->
  <text x="15" y="27" font-family="'Arial Black',Arial,sans-serif" font-size="12.5" font-weight="900" fill="#0f172a">TFQPDF</text>
  <!-- Rule under title -->
  <rect x="15" y="30.5" width="49" height="1.5" rx="0.75" fill="#e2e8f0"/>
  <!-- Content lines -->
  <rect x="15" y="36" width="45" height="2.5" rx="1.25" fill="#e2e8f0"/>
  <rect x="15" y="42" width="37" height="2.5" rx="1.25" fill="#e2e8f0"/>
  <rect x="15" y="48" width="49" height="2.5" rx="1.25" fill="#e2e8f0"/>
  <rect x="15" y="54" width="31" height="2.5" rx="1.25" fill="#e2e8f0"/>
  <rect x="15" y="60" width="43" height="2.5" rx="1.25" fill="#e2e8f0"/>
  <!-- Pen: cap ≈(28,35) upper-left, nib ≈(88,95) lower-right -->
  <g transform="translate(68,75) rotate(-45)">
    <!-- Eraser cap -->
    <rect x="-6" y="-57" width="12" height="8" rx="3" fill="#fb923c"/>
    <!-- Pen clip -->
    <rect x="4.5" y="-58" width="2.5" height="14" rx="1" fill="#c2410c"/>
    <!-- Ferrule -->
    <rect x="-6" y="-49" width="12" height="2.5" fill="#fdba74"/>
    <rect x="-6" y="-46.5" width="12" height="1.5" fill="#c2410c"/>
    <!-- Barrel -->
    <rect x="-6" y="-45" width="12" height="55" fill="#f97316"/>
    <!-- Barrel highlight -->
    <rect x="4" y="-45" width="3" height="55" fill="#fb923c" opacity="0.42"/>
    <!-- Taper -->
    <polygon points="-6,10 6,10 3,20 -3,20" fill="#ea6e0a"/>
    <!-- Nib -->
    <polygon points="-3,20 3,20 0,28" fill="#7c2d12"/>
    <!-- Nib slit -->
    <line x1="0" y1="20" x2="0" y2="27" stroke="#fed7aa" stroke-width="0.8"/>
  </g>
</svg>
